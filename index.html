<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wsido Xrtp ECHO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap');

:root {
    --main-cyan: #00f3ff;
    --main-yellow: #fcee0a;
    --main-red: #ff003c;
    --bg-dark: #010103;
}

body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-dark);
    color: #e4e4e7;
    font-family: 'Share Tech Mono', 'Noto Sans TC', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    cursor: none;
    transition: background-color 0.1s ease;
}

a, button {
    cursor: none;
}

#boot-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--bg-dark);
    z-index: 100000;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease;
}

#boot-screen span {
    font-size: 1.5rem;
    color: var(--main-cyan);
    letter-spacing: 4px;
    animation: blink 1s step-end infinite;
}

.cursor-dot {
    width: 10px;
    height: 10px;
    background-color: var(--main-cyan);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 200001;
    transform: translate(-50%, -50%);
    transition: background-color 0.2s, transform 0.1s;
    box-shadow: 0 0 10px var(--main-cyan);
}

.cursor-outline {
    width: 34px;
    height: 34px;
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 200000;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
}

.cursor-outline::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 1.5px dashed var(--main-cyan);
    border-radius: 50%;
    box-sizing: border-box;
    animation: hud-spin 6s linear infinite;
    transition: border-color 0.2s, background-color 0.2s, border-style 0.2s;
}

.cursor-outline.hover-normal { width: 60px; height: 60px; }
.cursor-outline.hover-normal::after { background-color: rgba(0, 243, 255, 0.1); border-style: solid; }

.cursor-outline.hover-yellow { width: 60px; height: 60px; }
.cursor-outline.hover-yellow::after { border-color: var(--main-yellow); background-color: rgba(252, 238, 10, 0.1); border-style: solid; }

.cursor-outline.hover-red { width: 60px; height: 60px; }
.cursor-outline.hover-red::after { border-color: var(--main-red); background-color: rgba(255, 0, 60, 0.2); border-style: solid; }

.cursor-outline.game-mode { width: 20px; height: 20px; }
.cursor-outline.game-mode::after { 
    border-color: var(--main-red); 
    border-style: solid; 
    border-width: 2px;
    animation: hud-spin 2s linear infinite;
}

.cursor-glow {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0, 243, 255, 0.1) 0%, transparent 60%);
    border-radius: 50%;
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.5s ease;
}

body:hover .cursor-glow {
    opacity: 1;
}

#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    opacity: 0.15;
    transition: opacity 0.1s ease;
}

.main-wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
    opacity: 1;
    transition: opacity 0.5s ease;
}

h1 {
    font-size: 3rem;
    color: #ffffff;
    text-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
    margin-top: 0;
    margin-bottom: 20px;
    letter-spacing: 3px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
}

#battle-btn-container {
    display: none;
    margin-bottom: 30px;
    height: 60px;
}

.battle-btn {
    background: transparent;
    color: var(--main-red);
    border: 2px solid var(--main-red);
    padding: 15px 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    font-weight: bold;
    letter-spacing: 5px;
    text-transform: uppercase;
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.4) inset, 0 0 15px rgba(255, 0, 60, 0.4);
    animation: battlePulse 1s infinite alternate;
}

.battle-btn:hover {
    background-color: var(--main-red);
    color: var(--bg-dark);
    box-shadow: 0 0 30px var(--main-red) inset, 0 0 30px var(--main-red);
}

.container {
    width: 100%;
    max-width: 600px;
    background-color: transparent;
    padding: 10px 40px 40px 40px;
    border-radius: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
    max-width: 450px;
}

.links a {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 24px;
    background-color: transparent;
    color: #a1a1aa;
    text-decoration: none;
    font-size: 1.2rem;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    transition: all 0.3s ease;
    letter-spacing: 1px;
    position: relative;
    opacity: 0;
    transform: scale(0.98);
    overflow: hidden;
}

.links a:hover {
    color: var(--main-cyan);
    border-color: var(--main-cyan);
    text-shadow: 0 0 10px var(--main-cyan);
    letter-spacing: 4px;
}

.links a.collaboration {
    border: 1px solid rgba(252, 238, 10, 0.3);
    color: var(--main-yellow);
}

.links a.collaboration:hover {
    border-color: var(--main-yellow);
    text-shadow: 0 0 10px var(--main-yellow);
    color: #fff;
}

.cmd-cursor {
    display: none;
}

.cmd-cursor::after {
    content: '_';
    font-weight: bold;
    color: var(--main-cyan);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
}

.sys-hint {
    position: fixed;
    bottom: 20px;
    right: 25px;
    font-size: 0.8rem;
    color: rgba(0, 243, 255, 0.2);
    z-index: 10;
    pointer-events: auto;
    display: flex;
    align-items: center;
}

.sys-hint::before {
    content: '[SYS.LOG]';
}

.sys-hint:hover::before {
    content: '';
}

body.error-mode {
    background-color: rgba(20, 0, 0, 0.95);
}

body.error-mode #matrix-canvas {
    opacity: 0.4;
}

body.error-mode .main-wrapper {
    animation: intenseGlitch 0.15s infinite;
    filter: drop-shadow(3px 0px 0px rgba(255,0,60,0.8)) drop-shadow(-3px 0px 0px rgba(0,243,255,0.8));
}

body.error-mode h1 {
    color: #ffcccc;
    text-shadow: 0 0 20px var(--main-red);
}

body.error-mode .links a {
    pointer-events: none;
    border-color: #333;
    color: #444;
    text-shadow: none;
    transform: scale(1);
    letter-spacing: 1px;
}

body.error-mode .links a::after {
    content: '';
    position: absolute;
    top: 50%;
    left: -10%;
    width: 120%;
    height: 14px;
    background: repeating-linear-gradient(45deg, var(--main-red), var(--main-red) 10px, #111 10px, #111 20px);
    transform: translateY(-50%) rotate(-3deg);
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.6);
    z-index: 10;
    opacity: 0.9;
}

body.error-mode .sys-hint {
    display: none;
}

#game-ui {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10005;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.game-hud-text {
    font-size: 1.5rem;
    color: var(--main-red);
    text-shadow: 0 0 10px var(--main-red);
    letter-spacing: 2px;
}

.hp-bar-container {
    width: 300px;
    height: 15px;
    border: 2px solid var(--main-red);
    padding: 2px;
    background: rgba(0,0,0,0.5);
}

.hp-bar-fill {
    width: 100%;
    height: 100%;
    background-color: var(--main-red);
    box-shadow: 0 0 10px var(--main-red);
    transition: width 0.1s;
}

.virus-projectile {
    position: fixed;
    z-index: 10004;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bullet-basic {
    background-color: var(--main-red);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    box-shadow: 0 0 15px var(--main-red);
    animation: bullet-spin-right 1s linear infinite;
}

.bullet-sniper {
    background: radial-gradient(circle, var(--main-red) 20%, transparent 80%);
    border: 2px solid var(--main-red);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--main-red), inset 0 0 10px var(--main-red);
    animation: pulse-danger 0.3s infinite alternate;
}

.bullet-sniper::after {
    content: '!';
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-weight: bold;
    font-size: 16px;
    text-shadow: 0 0 5px #fff;
}

.bullet-ring {
    background-color: transparent;
    border: 2px solid var(--main-red);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    animation: bullet-spin-left 2s linear infinite;
}

.bullet-ring::after {
    content: '';
    position: absolute;
    width: 50%;
    height: 50%;
    background-color: var(--main-red);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: 0 0 10px var(--main-red);
}

.system-msg-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.85);
    z-index: 100010;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.system-msg-text {
    font-size: 3rem;
    letter-spacing: 5px;
    text-shadow: 0 0 20px currentColor;
    text-align: center;
    line-height: 1.5;
}

.msg-success { color: var(--main-cyan); }
.msg-fail { color: var(--main-red); }

#rpg-container {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    z-index: 100020;
}

#rpg-canvas {
    display: block;
    width: 100%;
    height: 100%;
}

#dialog-box {
    display: none;
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 800px;
    height: 160px;
    background-color: #000;
    border: 4px solid #fff;
    box-sizing: border-box;
    padding: 20px 30px;
    z-index: 100021;
    font-family: 'Noto Sans TC', 'Share Tech Mono', monospace;
    font-size: 1.4rem;
    color: #fff;
    line-height: 1.6;
    white-space: pre-wrap;
}

.interaction-hint {
    display: none;
    position: fixed;
    top: 250px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    animation: blink 1s step-end infinite;
    z-index: 100021;
}

@keyframes hud-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes bullet-spin-right { 100% { transform: rotate(360deg); } }
@keyframes bullet-spin-left { 100% { transform: rotate(-360deg); } }

@keyframes pulse-danger { 
    from { transform: scale(0.9); } 
    to { transform: scale(1.1); } 
}

@keyframes blink { 50% { opacity: 0; } }

@keyframes intenseGlitch {
    0% { transform: translate(0, 0) skew(0deg); }
    20% { transform: translate(-2px, 2px) skew(-1deg); }
    40% { transform: translate(2px, -2px) skew(1deg); }
    60% { transform: translate(-2px, -2px) skew(0deg); }
    80% { transform: translate(2px, 2px) skew(1deg); }
    100% { transform: translate(0, 0) skew(0deg); }
}

@keyframes battlePulse {
    from { transform: scale(1); box-shadow: 0 0 10px rgba(255, 0, 60, 0.4) inset, 0 0 10px rgba(255, 0, 60, 0.4); }
    to { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 0, 60, 0.8) inset, 0 0 25px rgba(255, 0, 60, 0.8); }
}

body.hit-flash {
    background-color: rgba(255, 0, 60, 0.5);
}
</style>

</div>

        <span id="dialog-text"></span>
    </div>
</div>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const h1El = document.getElementById('h1-text');
    const h1Cursor = document.getElementById('h1-cursor');
    const links = document.querySelectorAll('.links a');
    const cmdTexts = document.querySelectorAll('.cmd-text');
    const cmdCursors = document.querySelectorAll('.cmd-cursor');
    const cursorDot = document.querySelector('.cursor-dot');
    const cursorOutline = document.querySelector('.cursor-outline');
    const cursorGlow = document.querySelector('.cursor-glow');
    const bootScreen = document.getElementById('boot-screen');
    const bgm = document.getElementById('bgm');
    const battleBgm = document.getElementById('battle-bgm');
    const sysHint = document.getElementById('sys-hint');
    const battleBtnContainer = document.getElementById('battle-btn-container');
    const startBattleBtn = document.getElementById('start-battle-btn');
    const linksContainer = document.getElementById('links-container');
    
    let activeKeys = {};
    window.addEventListener('keydown', e => { activeKeys[e.key.toLowerCase()] = true; activeKeys[e.key] = true; });
    window.addEventListener('keyup', e => { activeKeys[e.key.toLowerCase()] = false; activeKeys[e.key] = false; });

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let outlineX = mouseX;
    let outlineY = mouseY;

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        cursorDot.style.left = mouseX + 'px';
        cursorDot.style.top = mouseY + 'px';
        cursorGlow.style.left = mouseX + 'px';
        cursorGlow.style.top = mouseY + 'px';
    });

    function animateCursor() {
        let distX = mouseX - outlineX;
        let distY = mouseY - outlineY;
        outlineX += distX * 0.15;
        outlineY += distY * 0.15;
        cursorOutline.style.left = outlineX + 'px';
        cursorOutline.style.top = outlineY + 'px';
        requestAnimationFrame(animateCursor);
    }
    animateCursor();

    function setCursorState(state) {
        cursorOutline.className = 'cursor-outline';
        if (state) cursorOutline.classList.add(state);
    }

    links.forEach(link => {
        link.addEventListener('mouseenter', () => {
            if (document.body.classList.contains('error-mode')) return;
            if (link.classList.contains('collaboration')) {
                setCursorState('hover-yellow');
                cursorDot.style.backgroundColor = 'var(--main-yellow)';
            } else {
                setCursorState('hover-normal');
                cursorDot.style.backgroundColor = 'var(--main-cyan)';
            }
        });
        link.addEventListener('mouseleave', () => {
            if (document.body.classList.contains('error-mode')) return;
            setCursorState('');
            cursorDot.style.backgroundColor = 'var(--main-cyan)';
        });
    });

    startBattleBtn.addEventListener('mouseenter', () => {
        setCursorState('hover-red');
        cursorDot.style.backgroundColor = 'var(--main-red)';
    });
    startBattleBtn.addEventListener('mouseleave', () => {
        setCursorState('');
        cursorDot.style.backgroundColor = 'var(--main-red)';
    });

    let hintInterval;
    sysHint.addEventListener('mouseenter', () => {
        sysHint.innerHTML = '';
        const secret = 'SEQ: ↑ ↑ ↓ ↓ ← → ← → B A';
        let i = 0;
        hintInterval = setInterval(() => {
            if(i < secret.length) {
                sysHint.innerHTML += secret.charAt(i);
                i++;
            } else {
                clearInterval(hintInterval);
            }
        }, 50);
        setCursorState('hover-normal');
    });

    sysHint.addEventListener('mouseleave', () => {
        clearInterval(hintInterval);
        sysHint.innerHTML = '';
        setCursorState('');
    });

    function fadeAudio(audioOut, audioIn) {
        let outVol = audioOut ? audioOut.volume : 0;
        let inVol = 0;
        
        if (audioIn) {
            audioIn.volume = 0;
            audioIn.play().catch(e => console.log(e));
        }

        const fadeTimer = setInterval(() => {
            let doneOut = true;
            let doneIn = true;

            if (audioOut && outVol > 0.05) {
                outVol -= 0.05;
                audioOut.volume = outVol;
                doneOut = false;
            } else if (audioOut) {
                audioOut.pause();
                audioOut.volume = 1;
            }

            if (audioIn && inVol < 0.95) {
                inVol += 0.05;
                audioIn.volume = inVol;
                doneIn = false;
            } else if (audioIn) {
                audioIn.volume = 1;
            }

            if (doneOut && doneIn) {
                clearInterval(fadeTimer);
            }
        }, 50);
    }

    window.addEventListener('beforeunload', (e) => {
        if (document.body.classList.contains('error-mode')) {
            e.preventDefault();
            e.returnValue = ''; 
        }
    });

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && document.body.classList.contains('error-mode')) {
            takeDamage(9999, 'ESCAPE DETECTED\nTERMINATED');
        }
    });

    bootScreen.addEventListener('mouseenter', () => setCursorState('hover-normal'));
    bootScreen.addEventListener('mouseleave', () => setCursorState(''));

    bootScreen.addEventListener('click', () => {
        bgm.volume = 1;
        bgm.play().catch(e => console.log("Audio play failed"));
        bootScreen.style.opacity = '0';
        setCursorState('');
        setTimeout(() => {
            bootScreen.style.display = 'none';
            initTypewriter();
        }, 500);
    });

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const defaultAlphabet = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const errorAlphabet = 'ERROR404!';
    let currentAlphabet = defaultAlphabet;

    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) { drops[x] = 1; }

    let rainColor = '#00f3ff';

    function draw() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = rainColor; 
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const text = currentAlphabet.charAt(Math.floor(Math.random() * currentAlphabet.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }
    setInterval(draw, 35);

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    function typeText(element, text, callback, speed = 40) {
        let i = 0;
        element.innerHTML = '';
        const timer = setInterval(() => {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
            } else {
                clearInterval(timer);
                if (callback) callback();
            }
        }, speed);
    }

    const h1TextContent = 'Wsido Xrtp ECHO';
    
    function initTypewriter() {
        links.forEach(link => { 
            link.style.opacity = '0'; 
            link.style.transform = 'scale(0.98)';
        });
        cmdTexts.forEach(el => el.innerHTML = '');

        setTimeout(() => {
            h1Cursor.style.display = 'inline-block';
            typeText(h1El, h1TextContent, () => {
                h1Cursor.style.display = 'none';
                let currentLinkIndex = 0;
                function typeNextLink() {
                    if (currentLinkIndex < links.length) {
                        const link = links[currentLinkIndex];
                        const textEl = cmdTexts[currentLinkIndex];
                        const cursorEl = cmdCursors[currentLinkIndex + 1];
                        const textToType = textEl.getAttribute('data-text');

                        link.style.opacity = '1';
                        link.style.transform = 'scale(1)';
                        cursorEl.style.display = 'inline-block';

                        typeText(textEl, textToType, () => {
                            cursorEl.style.display = 'none';
                            currentLinkIndex++;
                            setTimeout(typeNextLink, 100); 
                        }, 30); 
                    }
                }
                setTimeout(typeNextLink, 200); 
            });
        }, 500);
    }

    const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
    let konamiIndex = 0;

    window.addEventListener('keydown', (e) => {
        if (!document.body.classList.contains('error-mode') && document.getElementById('rpg-container').style.display !== 'block') {
            if (e.key === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    triggerErrorMode();
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }
        }
    });

    function triggerErrorMode() {
        try { document.documentElement.requestFullscreen(); } catch (err) {}
        fadeAudio(bgm, battleBgm);
        document.body.classList.add('error-mode');
        rainColor = '#ff003c'; 
        currentAlphabet = errorAlphabet;
        cursorDot.style.backgroundColor = 'var(--main-red)';
        setCursorState('');
        cursorGlow.style.background = 'radial-gradient(circle, rgba(255, 0, 60, 0.15) 0%, transparent 60%)';
        h1El.innerHTML = 'FATAL SYSTEM OVERRIDE';
        battleBtnContainer.style.display = 'block';
    }

    startBattleBtn.addEventListener('click', () => {
        setCursorState('game-mode');
        startGame();
    });

    const mainWrapper = document.getElementById('main-wrapper');
    const gameUI = document.getElementById('game-ui');
    const hpBar = document.getElementById('hp-bar');
    const gameTimerEl = document.getElementById('game-timer');
    const msgOverlay = document.getElementById('msg-overlay');
    const msgText = document.getElementById('msg-text');
    
    let isGaming = false;
    let hp = 100;
    let timeLeft = 20;
    let gameLoopId;
    let timerId;
    let randomBulletId;
    let sniperBulletId;
    let ringBulletId;
    let projectiles = [];

    let prevX = mouseX;
    let prevY = mouseY;
    let idleTime = 0;

    function startGame() {
        isGaming = true;
        hp = 100;
        timeLeft = 20;
        projectiles = [];
        idleTime = 0;
        hpBar.style.width = '100%';
        gameTimerEl.innerText = `SURVIVE: ${timeLeft}s`;
        
        battleBtnContainer.style.display = 'none';
        linksContainer.style.display = 'none';
        gameUI.style.display = 'flex';
        
        randomBulletId = setInterval(spawnRandomBullet, 150);
        sniperBulletId = setInterval(() => spawnSniperBullet(false), 1200);
        ringBulletId = setInterval(spawnBulletRing, 4500);
        
        timerId = setInterval(updateTimer, 1000);
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function createBullet(x, y, vx, vy, size, dmg, typeClass) {
        const p = document.createElement('div');
        p.className = `virus-projectile ${typeClass}`;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        document.body.appendChild(p);
        projectiles.push({ el: p, x: x, y: y, vx: vx, vy: vy, size: size, dmg: dmg });
    }

    function spawnRandomBullet() {
        if(!isGaming) return;
        const size = 15;
        let startX, startY;
        const side = Math.floor(Math.random() * 4);
        if (side === 0) { startX = Math.random() * window.innerWidth; startY = -50; }
        else if (side === 1) { startX = window.innerWidth + 50; startY = Math.random() * window.innerHeight; }
        else if (side === 2) { startX = Math.random() * window.innerWidth; startY = window.innerHeight + 50; }
        else { startX = -50; startY = Math.random() * window.innerHeight; }
        let angle = Math.atan2(mouseY - startY, mouseX - startX);
        angle += (Math.random() - 0.5) * 1.2;
        const speed = Math.random() * 4 + 6;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        createBullet(startX, startY, vx, vy, size, 15, 'bullet-basic');
    }

    function spawnSniperBullet(isAfk) {
        if(!isGaming) return;
        const size = isAfk ? 35 : 28;
        let startX, startY;
        if(Math.random() > 0.5) {
            startX = Math.random() > 0.5 ? -50 : window.innerWidth + 50;
            startY = Math.random() * window.innerHeight;
        } else {
            startX = Math.random() * window.innerWidth;
            startY = Math.random() > 0.5 ? -50 : window.innerHeight + 50;
        }
        let angle = Math.atan2(mouseY - startY, mouseX - startX);
        const speed = isAfk ? 18 : 12;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        createBullet(startX, startY, vx, vy, size, isAfk ? 30 : 25, 'bullet-sniper');
    }

    function spawnBulletRing() {
        if(!isGaming) return;
        const numBullets = 20;
        const targetX = mouseX;
        const targetY = mouseY;
        const radius = 800;
        for(let i=0; i<numBullets; i++) {
            const angle = (i / numBullets) * Math.PI * 2;
            const startX = targetX + Math.cos(angle) * radius;
            const startY = targetY + Math.sin(angle) * radius;
            const speed = 8;
            const vx = -Math.cos(angle) * speed;
            const vy = -Math.sin(angle) * speed;
            createBullet(startX, startY, vx, vy, 20, 25, 'bullet-ring');
        }
    }

    function getDistToSegment(px, py, x1, y1, x2, y2) {
        let l2 = (x2 - x1)*(x2 - x1) + (y2 - y1)*(y2 - y1);
        if (l2 === 0) return Math.sqrt((px - x1)*(px - x1) + (py - y1)*(py - y1));
        let t = ((px - x1)*(x2 - x1) + (py - y1)*(y2 - y1)) / l2;
        t = Math.max(0, Math.min(1, t));
        let projX = x1 + t * (x2 - x1);
        let projY = y1 + t * (y2 - y1);
        return Math.sqrt((px - projX)*(px - projX) + (py - projY)*(py - projY));
    }

    function gameLoop() {
        if (!isGaming) return;
        if (Math.abs(mouseX - prevX) < 3 && Math.abs(mouseY - prevY) < 3) {
            idleTime++;
        } else {
            idleTime = 0;
        }
        if (idleTime > 60 && idleTime % 10 === 0) {
            spawnSniperBullet(true); 
        }
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.el.style.left = p.x + 'px';
            p.el.style.top = p.y + 'px';
            if (p.x < -100 || p.x > window.innerWidth + 100 || p.y < -100 || p.y > window.innerHeight + 100) {
                p.el.remove();
                projectiles.splice(i, 1);
                continue;
            }
            let dist = getDistToSegment(p.x + p.size/2, p.y + p.size/2, prevX, prevY, mouseX, mouseY);
            if (dist < p.size/2 + 3) {
                p.el.remove();
                projectiles.splice(i, 1);
                takeDamage(p.dmg);
            }
        }
        prevX = mouseX;
        prevY = mouseY;
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function takeDamage(amount, customMsg) {
        if (!isGaming) return;
        hp -= amount;
        hpBar.style.width = Math.max(0, hp) + '%';
        document.body.classList.add('hit-flash');
        setTimeout(() => document.body.classList.remove('hit-flash'), 100);
        if (hp <= 0) {
            endGame(false, customMsg);
        }
    }

    function updateTimer() {
        timeLeft--;
        gameTimerEl.innerText = `SURVIVE: ${timeLeft}s`;
        if (timeLeft <= 0) {
            endGame(true);
        }
    }

    function endGame(win, customMsg) {
        isGaming = false;
        clearInterval(randomBulletId);
        clearInterval(sniperBulletId);
        clearInterval(ringBulletId);
        clearInterval(timerId);
        cancelAnimationFrame(gameLoopId);
        
        projectiles.forEach(p => p.el.remove());
        projectiles = [];
        gameUI.style.display = 'none';
        
        msgOverlay.style.display = 'flex';
        msgText.className = 'system-msg-text ' + (win ? 'msg-success' : 'msg-fail');
        msgText.innerText = win ? 'BREACH SUCCESSFUL' : (customMsg || 'YOU DIED\nPRESS BATTLE TO RETRY');
        
        setTimeout(() => {
            msgOverlay.style.display = 'none';
            setCursorState('');

            if (win) {
                fadeAudio(battleBgm, bgm);
                startRPG();
            } else {
                hpBar.style.width = '100%';
                battleBtnContainer.style.display = 'block';
                linksContainer.style.display = 'flex'; 
            }
        }, 3000);
    }

    const rpgContainer = document.getElementById('rpg-container');
    const rpgCanvas = document.getElementById('rpg-canvas');
    const rpgCtx = rpgCanvas.getContext('2d');
    const dialogBox = document.getElementById('dialog-box');
    const dialogText = document.getElementById('dialog-text');
    const interactHint = document.getElementById('interaction-hint');

    let inRpg = false;
    let rpgLoopId;
    let pX = 0, pY = 0;
    const pSize = 32;
    const pSpeed = 2.5;
    const corridorWidth = 340;
    let leftBound, rightBound;
    let tX, tY;
    
    let dialogIndex = 0;
    let isTyping = false;
    let typeTimer;
    let zPressed = false;

    const dialogs = [
        "* 你竟然撐過去了...\n  You actually survived...",
        "* 這裡是被隱藏的伺服器核心。\n  This is the hidden server core.",
        "* 既然你通過了考驗...\n  Since you passed the trial...",
        "* 真正的 Wsido Xrtp ECHO 權限就交給你了。\n  The true root access of Wsido Xrtp ECHO is yours.",
        "[ 系統防火牆已解除 ]\n[ SYSTEM FIREWALL DISABLED ]"
    ];

    function startRPG() {
        inRpg = true;
        rpgContainer.style.display = 'block';
        rpgCanvas.width = window.innerWidth;
        rpgCanvas.height = window.innerHeight;
        
        leftBound = rpgCanvas.width / 2 - corridorWidth / 2;
        rightBound = rpgCanvas.width / 2 + corridorWidth / 2;
        
        pX = rpgCanvas.width / 2 - pSize / 2;
        pY = rpgCanvas.height - 120;
        
        tX = rpgCanvas.width / 2;
        tY = 150;
        
        dialogIndex = 0;
        
        document.body.style.cursor = 'none';
        cursorDot.style.display = 'none';
        cursorOutline.style.display = 'none';
        
        rpgLoopId = requestAnimationFrame(updateRPG);
    }

    function updateRPG() {
        if (!inRpg) return;
        
        rpgCtx.fillStyle = '#010103';
        rpgCtx.fillRect(0, 0, rpgCanvas.width, rpgCanvas.height);
        
        rpgCtx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        rpgCtx.lineWidth = 1;
        for(let i = leftBound; i <= rightBound; i+=40) {
            rpgCtx.beginPath(); rpgCtx.moveTo(i, 0); rpgCtx.lineTo(i, rpgCanvas.height); rpgCtx.stroke();
        }
        for(let i = 0; i < rpgCanvas.height; i+=40) {
            rpgCtx.beginPath(); rpgCtx.moveTo(leftBound, i); rpgCtx.lineTo(rightBound, i); rpgCtx.stroke();
        }

        let gradient = rpgCtx.createLinearGradient(0, tY - 50, 0, rpgCanvas.height);
        gradient.addColorStop(0, 'rgba(0, 243, 255, 0.15)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        rpgCtx.fillStyle = gradient;
        rpgCtx.fillRect(leftBound, 0, corridorWidth, rpgCanvas.height);

        rpgCtx.strokeStyle = 'var(--main-cyan)';
        rpgCtx.lineWidth = 2;
        rpgCtx.shadowBlur = 15;
        rpgCtx.shadowColor = 'var(--main-cyan)';
        rpgCtx.beginPath();
        rpgCtx.moveTo(leftBound, 0); rpgCtx.lineTo(leftBound, rpgCanvas.height);
        rpgCtx.moveTo(rightBound, 0); rpgCtx.lineTo(rightBound, rpgCanvas.height);
        rpgCtx.stroke();
        
        let offset = (Date.now() / 20) % 150;
        rpgCtx.fillStyle = 'rgba(0, 243, 255, 0.6)';
        for (let i = 0; i < rpgCanvas.height; i += 150) {
            let drawY = rpgCanvas.height - ((i + offset) % rpgCanvas.height);
            if (drawY > tY) {
                rpgCtx.beginPath();
                rpgCtx.moveTo(rpgCanvas.width/2 - 25, drawY);
                rpgCtx.lineTo(rpgCanvas.width/2, drawY - 20);
                rpgCtx.lineTo(rpgCanvas.width/2 + 25, drawY);
                rpgCtx.lineTo(rpgCanvas.width/2, drawY - 8);
                rpgCtx.fill();
            }
        }
        rpgCtx.shadowBlur = 0;

        rpgCtx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        rpgCtx.fillRect(0, 0, leftBound, rpgCanvas.height);
        rpgCtx.fillRect(rightBound, 0, rpgCanvas.width - rightBound, rpgCanvas.height);

        if (dialogBox.style.display !== 'block') {
            if (activeKeys['arrowup'] || activeKeys['w']) pY -= pSpeed;
            if (activeKeys['arrowdown'] || activeKeys['s']) pY += pSpeed;
            if (activeKeys['arrowleft'] || activeKeys['a']) pX -= pSpeed;
            if (activeKeys['arrowright'] || activeKeys['d']) pX += pSpeed;
        }

        pX = Math.max(leftBound + 10, Math.min(rightBound - pSize - 10, pX));
        pY = Math.max(tY, Math.min(rpgCanvas.height - pSize - 20, pY));

        const tSize = 40;
        rpgCtx.fillStyle = 'rgba(252, 238, 10, 0.2)';
        rpgCtx.beginPath();
        rpgCtx.arc(tX, tY, tSize + Math.sin(Date.now() / 200) * 8, 0, Math.PI * 2);
        rpgCtx.fill();
        
        rpgCtx.fillStyle = 'var(--main-yellow)';
        rpgCtx.fillRect(tX - tSize/2, tY - tSize/2, tSize, tSize);
        rpgCtx.fillStyle = '#fff';
        rpgCtx.fillRect(tX - tSize/4, tY - tSize/4, tSize/2, tSize/2);

        rpgCtx.fillStyle = 'var(--main-cyan)';
        rpgCtx.fillRect(pX, pY, pSize, pSize);
        rpgCtx.fillStyle = '#000';
        rpgCtx.fillRect(pX + 6, pY + 8, 6, 6);
        rpgCtx.fillRect(pX + 20, pY + 8, 6, 6);

        let dist = Math.hypot(pX + pSize/2 - tX, pY + pSize/2 - tY);
        if (dist < 80 && dialogBox.style.display !== 'block') {
            interactHint.style.display = 'block';
            if ((activeKeys['z'] || activeKeys['enter']) && !zPressed) {
                zPressed = true;
                showDialog();
            }
        } else {
            interactHint.style.display = 'none';
        }

        if (!(activeKeys['z'] || activeKeys['enter'])) {
            zPressed = false;
        }

        if (dialogBox.style.display === 'block' && (activeKeys['z'] || activeKeys['enter']) && !zPressed) {
            zPressed = true;
            if (isTyping) {
                clearInterval(typeTimer);
                dialogText.textContent = dialogs[dialogIndex];
                isTyping = false;
            } else {
                dialogIndex++;
                if (dialogIndex < dialogs.length) {
                    showDialog();
                } else {
                    endRPG();
                }
            }
        }

        rpgLoopId = requestAnimationFrame(updateRPG);
    }

    function showDialog() {
        interactHint.style.display = 'none';
        dialogBox.style.display = 'block';
        dialogText.textContent = '';
        isTyping = true;
        let text = dialogs[dialogIndex];
        let i = 0;
        
        clearInterval(typeTimer);
        typeTimer = setInterval(() => {
            if (i < text.length) {
                dialogText.textContent += text.charAt(i);
                i++;
            } else {
                clearInterval(typeTimer);
                isTyping = false;
            }
        }, 30);
    }

    function endRPG() {
        inRpg = false;
        cancelAnimationFrame(rpgLoopId);
        dialogBox.style.display = 'none';
        rpgContainer.style.opacity = '0';
        rpgContainer.style.transition = 'opacity 2s ease';
        
        setTimeout(() => {
            rpgContainer.style.display = 'none';
            try { document.exitFullscreen(); } catch(err) {}
            
            document.body.style.cursor = 'none';
            cursorDot.style.display = 'block';
            cursorOutline.style.display = 'block';
            
            document.body.classList.remove('error-mode');
            rainColor = '#00f3ff';
            currentAlphabet = defaultAlphabet;
            cursorDot.style.backgroundColor = 'var(--main-cyan)';
            cursorGlow.style.background = 'radial-gradient(circle, rgba(0, 243, 255, 0.1) 0%, transparent 60%)';
            
            h1El.innerHTML = '';
            typeText(h1El, h1TextContent, () => {});
            
            battleBtnContainer.style.display = 'none';
            linksContainer.style.display = 'flex';
        }, 2000);
    }
</script>
