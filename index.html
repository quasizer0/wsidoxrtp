<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wsido Xrtp ECHO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap');

:root {
    --main-cyan: #00f3ff;
    --main-yellow: #fcee0a;
    --main-red: #ff003c;
    --bg-dark: #010103;
}

body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-dark);
    color: #e4e4e7;
    font-family: 'Share Tech Mono', 'Noto Sans TC', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    cursor: none;
    transition: background-color 0.1s ease;
}

a, button {
    cursor: none;
}

#boot-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--bg-dark);
    z-index: 100000;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease;
}

#boot-screen span {
    font-size: 1.5rem;
    color: var(--main-cyan);
    letter-spacing: 4px;
    animation: blink 1s step-end infinite;
}

.cursor-dot {
    width: 10px;
    height: 10px;
    background-color: var(--main-cyan);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 200001;
    transform: translate(-50%, -50%);
    transition: background-color 0.2s, transform 0.1s;
    box-shadow: 0 0 10px var(--main-cyan);
}

.cursor-outline {
    width: 34px;
    height: 34px;
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 200000;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
}

.cursor-outline::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 1.5px dashed var(--main-cyan);
    border-radius: 50%;
    box-sizing: border-box;
    animation: hud-spin 6s linear infinite;
    transition: border-color 0.2s, background-color 0.2s, border-style 0.2s;
}

.cursor-outline.hover-normal { width: 60px; height: 60px; }
.cursor-outline.hover-normal::after { background-color: rgba(0, 243, 255, 0.1); border-style: solid; }

.cursor-outline.hover-yellow { width: 60px; height: 60px; }
.cursor-outline.hover-yellow::after { border-color: var(--main-yellow); background-color: rgba(252, 238, 10, 0.1); border-style: solid; }

.cursor-outline.hover-red { width: 60px; height: 60px; }
.cursor-outline.hover-red::after { border-color: var(--main-red); background-color: rgba(255, 0, 60, 0.2); border-style: solid; }

.cursor-outline.game-mode { width: 20px; height: 20px; }
.cursor-outline.game-mode::after { 
    border-color: var(--main-red); 
    border-style: solid; 
    border-width: 2px;
    animation: hud-spin 2s linear infinite;
}

.cursor-glow {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0, 243, 255, 0.1) 0%, transparent 60%);
    border-radius: 50%;
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.5s ease;
}

body:hover .cursor-glow {
    opacity: 1;
}

#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    opacity: 0.15;
    transition: opacity 0.1s ease;
}

.main-wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
    opacity: 1;
    transition: opacity 0.5s ease;
}

h1 {
    font-size: 3rem;
    color: #ffffff;
    text-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
    margin-top: 0;
    margin-bottom: 20px;
    letter-spacing: 3px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
}

#battle-btn-container {
    display: none;
    margin-bottom: 20px;
}

.battle-btn {
    background: transparent;
    color: var(--main-red);
    border: 2px solid var(--main-red);
    padding: 15px 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    font-weight: bold;
    letter-spacing: 5px;
    text-transform: uppercase;
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.4) inset, 0 0 15px rgba(255, 0, 60, 0.4);
    animation: battlePulse 1s infinite alternate;
    pointer-events: auto;
    transition: all 0.2s ease;
}

.battle-btn:hover {
    background-color: var(--main-red);
    color: #010103;
    box-shadow: 0 0 30px var(--main-red) inset, 0 0 30px var(--main-red);
}

.container {
    width: 100%;
    max-width: 600px;
    background-color: transparent;
    padding: 10px 40px 40px 40px;
    border-radius: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
    max-width: 450px;
}

.links a {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 24px;
    background-color: transparent;
    color: #a1a1aa;
    text-decoration: none;
    font-size: 1.2rem;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    transition: all 0.3s ease;
    letter-spacing: 1px;
    position: relative;
    opacity: 0;
    transform: scale(0.98);
    overflow: hidden;
}

.links a:hover {
    color: var(--main-cyan);
    border-color: var(--main-cyan);
    text-shadow: 0 0 10px var(--main-cyan);
    letter-spacing: 4px;
}

.links a.collaboration {
    border: 1px solid rgba(252, 238, 10, 0.3);
    color: var(--main-yellow);
}

.links a.collaboration:hover {
    border-color: var(--main-yellow);
    text-shadow: 0 0 10px var(--main-yellow);
    color: #fff;
}

.cmd-cursor {
    display: none;
}

.cmd-cursor::after {
    content: '_';
    font-weight: bold;
    color: var(--main-cyan);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
}

.sys-hint {
    position: fixed;
    bottom: 20px;
    right: 25px;
    font-size: 0.8rem;
    color: rgba(0, 243, 255, 0.2);
    z-index: 50;
    pointer-events: auto;
    display: flex;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.3s;
}

.sys-hint:hover {
    color: var(--main-cyan);
}

body.error-mode {
    background-color: rgba(20, 0, 0, 0.95);
}

body.error-mode #matrix-canvas { opacity: 0.4; }
body.error-mode .main-wrapper {
    animation: intenseGlitch 0.15s infinite;
    filter: drop-shadow(3px 0px 0px rgba(255,0,60,0.8)) drop-shadow(-3px 0px 0px rgba(0,243,255,0.8));
}
body.error-mode h1 { color: #ffcccc; text-shadow: 0 0 20px var(--main-red); }
body.error-mode .sys-hint { display: none; }
body.error-mode #battle-btn-container { display: block; }

body.error-mode .links a {
    pointer-events: none;
    border-color: rgba(255, 0, 60, 0.3);
    background-color: rgba(20, 0, 0, 0.4);
    transform: scale(1);
    box-shadow: none;
}

body.error-mode .links a .cmd-text {
    color: var(--main-red);
    text-decoration: line-through;
    opacity: 0.5;
    text-shadow: 0 0 5px rgba(255, 0, 60, 0.5);
}

body.error-mode .links a.collaboration .cmd-text {
    color: var(--main-red); 
}

#game-ui {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10005;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.game-hud-text {
    font-size: 1.5rem;
    color: var(--main-red);
    text-shadow: 0 0 10px var(--main-red);
    letter-spacing: 2px;
}

.hp-bar-container {
    width: 300px;
    height: 15px;
    border: 2px solid var(--main-red);
    padding: 2px;
    background: rgba(0,0,0,0.5);
}

.hp-bar-fill {
    width: 100%;
    height: 100%;
    background-color: var(--main-red);
    box-shadow: 0 0 10px var(--main-red);
    transition: width 0.1s;
}

.virus-projectile {
    position: fixed;
    z-index: 10004;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bullet-basic {
    background-color: var(--main-red);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    box-shadow: 0 0 15px var(--main-red);
    animation: bullet-spin-right 1s linear infinite;
}

.bullet-sniper {
    background: radial-gradient(circle, var(--main-red) 20%, transparent 80%);
    border: 2px solid var(--main-red);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--main-red), inset 0 0 10px var(--main-red);
    animation: pulse-danger 0.3s infinite alternate;
}

.bullet-sniper::after {
    content: '!';
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-weight: bold;
    font-size: 16px;
    text-shadow: 0 0 5px #fff;
}

.bullet-ring {
    background-color: transparent;
    border: 2px solid var(--main-red);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    animation: bullet-spin-left 2s linear infinite;
}

.bullet-ring::after {
    content: '';
    position: absolute;
    width: 50%;
    height: 50%;
    background-color: var(--main-red);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: 0 0 10px var(--main-red);
}

.system-msg-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(20, 0, 5, 0.9);
    z-index: 100030;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.system-msg-text {
    font-size: 3rem;
    letter-spacing: 5px;
    text-align: center;
    line-height: 1.5;
    font-family: 'Share Tech Mono', monospace;
    color: var(--main-red) !important;
    text-shadow: 0 0 20px var(--main-red) !important;
}

#rpg-container {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    z-index: 100020;
}

#rpg-canvas { display: block; width: 100%; height: 100%; }

.vignette-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, transparent 10%, rgba(1, 1, 3, 0.95) 90%);
    pointer-events: none;
    z-index: 100021;
}

#dialog-box {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70%;
    max-width: 800px;
    background-color: rgba(1, 1, 3, 0.95);
    border-top: 1px solid var(--main-cyan);
    border-bottom: 1px solid var(--main-cyan);
    box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
    box-sizing: border-box;
    padding: 40px 50px;
    z-index: 100022;
    flex-direction: column;
    gap: 15px;
}

#dialog-ch {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1.4rem;
    color: #ffffff;
    line-height: 1.6;
    letter-spacing: 2px;
}

#dialog-en {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: var(--main-cyan);
    opacity: 0.8;
    letter-spacing: 1px;
}

.interaction-hint {
    display: none;
    position: fixed;
    bottom: 20%;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    letter-spacing: 2px;
    animation: blink 1s step-end infinite;
    z-index: 100021;
}

#move-hint {
    position: fixed;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    color: var(--main-cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    letter-spacing: 4px;
    z-index: 100021;
    transition: opacity 1s ease;
    pointer-events: none;
    text-shadow: 0 0 10px var(--main-cyan);
}

#flash-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #fff;
    z-index: 100040;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease-out;
}

#black-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    z-index: 100050;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
}

@keyframes battlePulse { 0% { border-color: rgba(255,0,60,0.5); } 100% { border-color: rgba(255,0,60,1); } }
@keyframes bullet-spin-right { 100% { transform: rotate(360deg); } }
@keyframes bullet-spin-left { 100% { transform: rotate(-360deg); } }
@keyframes pulse-danger { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
@keyframes hud-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes blink { 50% { opacity: 0; } }
@keyframes intenseGlitch {
    0% { transform: translate(0, 0) skew(0deg); }
    20% { transform: translate(-2px, 2px) skew(-1deg); }
    40% { transform: translate(2px, -2px) skew(1deg); }
    60% { transform: translate(-2px, -2px) skew(0deg); }
    80% { transform: translate(2px, 2px) skew(1deg); }
    100% { transform: translate(0, 0) skew(0deg); }
}
body.hit-flash { background-color: rgba(255, 0, 60, 0.4); }
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

                <span class="cmd-text" data-text="Music Collaboration"></span><span class="cmd-cursor"></span>
            </a>

            </a>

                <span class="cmd-text" data-text="X (Twitter)"></span><span class="cmd-cursor"></span>
            </a>

                <span class="cmd-text" data-text="Threads"></span><span class="cmd-cursor"></span>
            </a>
            <a href="https://www.instagram.com/wsidoxrtp/" target="_blank">
                <span class="cmd-text" data-text="Instagram"></span><span class="cmd-cursor"></span>
            </a>
            <a href="#" onclick="if(!document.body.classList.contains('error-mode')){navigator.clipboard.writeText('quasi_zer0'); this.querySelector('.cmd-text').innerText='ID Copied!'; setTimeout(() => { this.querySelector('.cmd-text').innerText='Discord: quasi_zer0'; }, 2000);} return false;">
                <span class="cmd-text" data-text="Discord: quasi_zer0"></span><span class="cmd-cursor"></span>

</div>

    <div class="game-hud-text" id="game-timer">SURVIVE: 20s</div>
    <div class="game-hud-text">INTEGRITY</div>
    <div class="hp-bar-container"><div class="hp-bar-fill" id="hp-bar"></div></div>
</div>

<div id="rpg-container">
    <canvas id="rpg-canvas"></canvas>
    <div class="vignette-overlay" id="vignette" style="display:none;"></div>
    <div id="move-hint"></div>
    <div class="interaction-hint" id="interaction-hint">[ PRESS Z TO INTERACT ]</div>
    <div id="dialog-box">
        <div id="dialog-ch"></div>
        <div id="dialog-en"></div>
    </div>
</div>

<div class="system-msg-overlay" id="msg-overlay">
    <div class="system-msg-text" id="msg-text"></div>
</div>

<div id="flash-overlay"></div>
<div id="black-overlay"></div>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const h1El = document.getElementById('h1-text');
    const h1Cursor = document.getElementById('h1-cursor');
    const mainWrapper = document.getElementById('main-wrapper');
    const links = document.querySelectorAll('.links a');
    const cmdTexts = document.querySelectorAll('.cmd-text');
    const cmdCursors = document.querySelectorAll('.cmd-cursor');
    const cursorDot = document.querySelector('.cursor-dot');
    const cursorOutline = document.querySelector('.cursor-outline');
    const cursorGlow = document.querySelector('.cursor-glow');
    const bootScreen = document.getElementById('boot-screen');
    const bootText = document.getElementById('boot-text');
    const sysHint = document.getElementById('sys-hint');
    const bgm = document.getElementById('bgm');
    const battleBgm = document.getElementById('battle-bgm');
    const rpgBgm = document.getElementById('rpg-bgm');

    const startBattleBtn = document.getElementById('start-battle-btn');
    
    const gameUI = document.getElementById('game-ui');
    const gameTimerEl = document.getElementById('game-timer');
    const hpBar = document.getElementById('hp-bar');
    const msgOverlay = document.getElementById('msg-overlay');
    const msgText = document.getElementById('msg-text');
    const flashOverlay = document.getElementById('flash-overlay');
    const blackOverlay = document.getElementById('black-overlay');

    const rpgContainer = document.getElementById('rpg-container');
    const rpgCanvas = document.getElementById('rpg-canvas');
    const rpgCtx = rpgCanvas.getContext('2d');
    const moveHint = document.getElementById('move-hint');
    const vignette = document.getElementById('vignette');
    const dialogBox = document.getElementById('dialog-box');
    const dialogCh = document.getElementById('dialog-ch');
    const dialogEn = document.getElementById('dialog-en');
    const interactHint = document.getElementById('interaction-hint');

    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    let outlineX = mouseX, outlineY = mouseY;
    let activeKeys = {};
    let hp = 100;

    let inBulletHell = false;
    let inDefrag = false;
    let inRPG = false;

    window.addEventListener('keydown', e => { activeKeys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { activeKeys[e.key.toLowerCase()] = false; });

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        cursorDot.style.left = mouseX + 'px'; cursorDot.style.top = mouseY + 'px';
        cursorGlow.style.left = mouseX + 'px'; cursorGlow.style.top = mouseY + 'px';
    });

    function animateCursor() {
        outlineX += (mouseX - outlineX) * 0.15;
        outlineY += (mouseY - outlineY) * 0.15;
        cursorOutline.style.left = outlineX + 'px'; cursorOutline.style.top = outlineY + 'px';
        requestAnimationFrame(animateCursor);
    }
    animateCursor();

    function setCursorState(state) {
        cursorOutline.className = 'cursor-outline';
        if (state) cursorOutline.classList.add(state);
    }

    links.forEach(link => {
        link.addEventListener('mouseenter', () => {
            if (document.body.classList.contains('error-mode')) return;
            if (link.classList.contains('collaboration')) {
                setCursorState('hover-yellow');
                cursorDot.style.backgroundColor = 'var(--main-yellow)';
            } else {
                setCursorState('hover-normal');
                cursorDot.style.backgroundColor = 'var(--main-cyan)';
            }
        });
        link.addEventListener('mouseleave', () => {
            if (document.body.classList.contains('error-mode')) return;
            setCursorState('');
            cursorDot.style.backgroundColor = 'var(--main-cyan)';
        });
    });

    startBattleBtn.addEventListener('mouseenter', () => {
        setCursorState('hover-red');
        cursorDot.style.backgroundColor = 'var(--main-red)';
    });
    startBattleBtn.addEventListener('mouseleave', () => {
        setCursorState('');
        cursorDot.style.backgroundColor = 'var(--main-red)';
    });

    let hintInterval;
    sysHint.addEventListener('mouseenter', () => {
        clearInterval(hintInterval);
        sysHint.innerText = '';
        const secret = 'SEQ: ↑ ↑ ↓ ↓ ← → ← → B A';
        let i = 0;
        hintInterval = setInterval(() => {
            if(i < secret.length) { sysHint.innerText += secret.charAt(i); i++; } 
            else { clearInterval(hintInterval); }
        }, 50);
        setCursorState('hover-normal');
    });

    sysHint.addEventListener('mouseleave', () => {
        clearInterval(hintInterval);
        sysHint.innerText = '[SYS.LOG]';
        setCursorState('');
    });

    function fadeAudio(audioOut, audioIn) {
        let outVol = audioOut ? audioOut.volume : 0;
        let inVol = 0;
        if (audioIn) { audioIn.volume = 0; audioIn.play().catch(e=>{}); }
        const fadeTimer = setInterval(() => {
            let doneOut = true; let doneIn = true;
            if (audioOut && outVol > 0.05) { outVol -= 0.05; audioOut.volume = outVol; doneOut = false; } 
            else if (audioOut) { audioOut.pause(); audioOut.volume = 1; }
            if (audioIn && inVol < 0.95) { inVol += 0.05; audioIn.volume = inVol; doneIn = false; } 
            else if (audioIn) { audioIn.volume = 1; }
            if (doneOut && doneIn) clearInterval(fadeTimer);
        }, 50);
    }

    bootScreen.addEventListener('click', () => {
        bgm.play().catch(e=>{});

        let t = Math.max(0, Math.min(1, ((px - x1)*(x2 - x1) + (py - y1)*(y2 - y1)) / l2));
        return Math.sqrt((px - (x1 + t * (x2 - x1)))*(px - (x1 + t * (x2 - x1))) + (py - (y1 + t * (y2 - y1)))*(py - (y1 + t * (y2 - y1))));

            rpgCtx.lineTo(offsetX + c * cellSize, offsetY + gridRows * cellSize);
            rpgCtx.stroke();
        }

        zones.forEach(z => {
            let zx = offsetX + z.c * cellSize;
            let zy = offsetY + z.r * cellSize;

            if (z.state === 'warning') {

        rpgCtx.moveTo(rightBound, 0); rpgCtx.lineTo(rightBound, worldHeight);
        rpgCtx.stroke();
        rpgCtx.shadowBlur = 0;

        let pulseOffset = (Date.now() / 15) % worldHeight;
        for(let i=0; i<4; i++) {
             let waveY = worldHeight - ((pulseOffset + i * 800) % worldHeight);
             if (waveY > tY) {
                 let grad = rpgCtx.createLinearGradient(0, waveY-100, 0, waveY+100);
                 grad.addColorStop(0, 'rgba(0, 243, 255, 0)');
                 grad.addColorStop(0.5, 'rgba(0, 243, 255, 0.15)');
                 grad.addColorStop(1, 'rgba(0, 243, 255, 0)');
                 rpgCtx.fillStyle = grad;
                 rpgCtx.fillRect(leftBound, waveY-100, corridorWidth, 200);
             }
        }

        let terminalGlow = rpgCtx.createRadialGradient(tX, tY, 0, tX, tY, 800);
        terminalGlow.addColorStop(0, 'rgba(252, 238, 10, 0.25)');
        terminalGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        rpgCtx.fillStyle = terminalGlow;
        rpgCtx.fillRect(leftBound, camY, corridorWidth, window.innerHeight);

        const tSize = 40;
        rpgCtx.fillStyle = 'rgba(252, 238, 10, 0.2)';
        rpgCtx.beginPath();
        rpgCtx.arc(tX, tY, tSize + Math.sin(Date.now() / 300) * 10, 0, Math.PI * 2);
        rpgCtx.fill();
        rpgCtx.fillStyle = '#fcee0a';
        rpgCtx.fillRect(tX - tSize/2, tY - tSize/2, tSize, tSize);
        rpgCtx.fillStyle = '#fff';
        rpgCtx.fillRect(tX - tSize/4, tY - tSize/4, tSize/2, tSize/2);

        rpgCtx.fillStyle = '#00f3ff';
        rpgCtx.fillRect(pX, pY, pSize, pSize);
        rpgCtx.fillStyle = '#000';
        rpgCtx.fillRect(pX + 6, pY + 8, 6, 6);
        rpgCtx.fillRect(pX + 20, pY + 8, 6, 6);

        let dist = Math.hypot(pX + pSize/2 - tX, pY + pSize/2 - tY);
        if (dist < 90 && !isDialogActive) {
            interactHint.style.display = 'block';
            if ((activeKeys['z'] || activeKeys['enter']) && !zPressed) {
                zPressed = true;
                isDialogActive = true;
                showDialog();
            }
        } else {
            interactHint.style.display = 'none';
        }

        rpgCtx.restore();

        rpgCtx.fillStyle = 'rgba(0, 243, 255, 0.3)';
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0) p.x = window.innerWidth;
            if(p.x > window.innerWidth) p.x = 0;
            if(p.y < 0) p.y = window.innerHeight;
            if(p.y > window.innerHeight) p.y = 0;
            rpgCtx.fillRect(p.x, p.y, p.s, p.s);
        });

        if (isDialogActive && (activeKeys['z'] || activeKeys['enter']) && !zPressed) {
            zPressed = true;
            if (isTyping) {
                clearInterval(typeTimer);
                dialogCh.innerText = "* " + dialogs[dialogIndex].ch;
                dialogEn.innerText = dialogs[dialogIndex].en;
                isTyping = false;
            } else {
                dialogIndex++;
                if (dialogIndex < dialogs.length) {
                    showDialog();
                } else {
                    endRPG();
                }
            }
        }

        if (!(activeKeys['z'] || activeKeys['enter'])) zPressed = false;

        rpgLoopId = requestAnimationFrame(rpgLoop);
    }

    function showDialog() {
        interactHint.style.display = 'none';
        dialogBox.style.display = 'flex';
        dialogCh.innerText = '';
        dialogEn.innerText = '';
        isTyping = true;
        
        let textCh = "* " + dialogs[dialogIndex].ch;
        let textEn = dialogs[dialogIndex].en;
        let i = 0, j = 0;
        
        clearInterval(typeTimer);
        typeTimer = setInterval(() => {
            if (i < textCh.length) { dialogCh.innerText += textCh.charAt(i); i++; } 
            else if (j < textEn.length) { dialogEn.innerText += textEn.charAt(j); j++; } 
            else { clearInterval(typeTimer); isTyping = false; }
        }, 40);
    }

    function endRPG() {
        if (!inRPG) return;
        inRPG = false;
        cancelAnimationFrame(rpgLoopId);
        dialogBox.style.display = 'none';
        
        fadeAudio(rpgBgm, null);
        blackOverlay.style.opacity = '1';
        
        setTimeout(() => {
            rpgContainer.style.display = 'none';
            document.body.style.cursor = 'none';
            cursorDot.style.display = 'block';
            cursorOutline.style.display = 'block';
            
            document.body.classList.remove('error-mode');
            rainColor = '#00f3ff';
            currentAlphabet = defaultAlphabet;
            cursorDot.style.backgroundColor = 'var(--main-cyan)';
            cursorGlow.style.background = 'radial-gradient(circle, rgba(0, 243, 255, 0.1) 0%, transparent 60%)';
            
            mainWrapper.style.display = 'flex'; 
            h1El.innerHTML = '';
            
            bootScreen.style.opacity = '1';
            bootScreen.style.display = 'flex';
            bootText.innerText = '[ SYSTEM REBOOT ]';
            
            setTimeout(() => {
                blackOverlay.style.opacity = '0';
                bgm.play().catch(e=>{});
                bgm.volume = 1;
                
                setTimeout(() => {
                    bootScreen.style.opacity = '0';
                    setTimeout(() => {
                        bootScreen.style.display = 'none';
                        initTypewriter();
                    }, 500);
                }, 1500);
            }, 1000);
        }, 1500);
    }
</script>
